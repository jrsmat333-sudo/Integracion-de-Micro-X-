openapi: 3.0.3
info:
  title: Servicio de Atracciones API
  description: Contrato de integración REST para el sistema central de Booking. Provee el catálogo de atracciones y su disponibilidad.
  version: 1.0.0
servers:
  - url: 
    description: 

paths:
  /atracciones:
    get:
      summary: Listar atracciones
      description: Obtiene un listado paginado de atracciones activas, con opción de filtrado.
      operationId: GetAtracciones
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: pageSize
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          description: Búsqueda por nombre o descripción
          schema:
            type: string
        - name: ubicacion
          in: query
          schema:
            type: string
        - name: disponible
          in: query
          description: Filtrar solo atracciones que tengan cupos futuros
          schema:
            type: boolean
      responses:
        '200':
          description: Listado obtenido con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListAtraccion'

  /atracciones/{id}:
    get:
      summary: Obtener atracción por ID
      description: Recupera los detalles de una atracción específica para el espejo en Booking.
      operationId: GetAtraccionById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Atracción encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseAtraccion'
        '404':
          description: Atracción no encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'

  /atracciones/{id}/disponibilidad:
    get:
      summary: Consultar disponibilidad
      description: Obtiene la disponibilidad agrupada por fechas para una atracción específica.
      operationId: GetDisponibilidadAtraccion
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: fecha
          in: query
          description: Fecha específica (yyyy-MM-dd) para consultar un solo día. Si se omite, devuelve un rango por defecto (ej. próximos 30 días).
          schema:
            type: string
            format: date
      responses:
        '200':
          description: Disponibilidad consultada con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListDisponibilidad'

  /booking:
    post:
      summary: Crear una reserva
      description: Bloquea el cupo y registra los pasajeros para una atracción específica.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookingRequest'
      responses:
        '200':
          description: Reserva creada con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseBooking'
        '400':
          description: Error en la solicitud (ej. sin cupos)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseError'

    get:
      summary: Listar mis reservas
      description: Obtiene el historial de reservas del usuario autenticado.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Listado obtenido con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListBooking'

  /booking/{id}/cancel:
    post:
      summary: Cancelar una reserva
      description: Cancela la reserva y libera los cupos en el inventario.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Reserva cancelada con éxito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseSuccess'

  /billing/management:
    get:
      summary: Listar facturas (Admin)
      description: Obtiene el listado de facturas generadas por el sistema.
      tags: [Billing]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Lista de facturas obtenida
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseListInvoice'

  /client/validate/{docNumber}:
    get:
      summary: Validar cliente por identificación
      description: Verifica si un cliente ya existe en el sistema por su número de documento.
      tags: [Client]
      security:
        - BearerAuth: []
      parameters:
        - name: docNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resultado de la validación (objeto cliente o null)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseClient'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AtraccionDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nombre:
          type: string
        descripcion:
          type: string
        precio:
          type: number
          format: double
        moneda:
          type: string
          default: USD
        ubicacion:
          type: string
        imagenUrl:
          type: string
          format: uri
        disponible:
          type: boolean
      required: [id, nombre, descripcion, precio, moneda, ubicacion, imagenUrl, disponible]

    DisponibilidadDto:
      type: object
      properties:
        fecha:
          type: string
          format: date
        cuposDisponibles:
          type: integer
      required: [fecha, cuposDisponibles]

    BookingRequest:
      type: object
      properties:
        slotId:
          type: string
          format: uuid
        tickets:
          type: array
          items:
            $ref: '#/components/schemas/TicketDetail'
        notas:
          type: string
          nullable: true
      required: [slotId, tickets]

    TicketDetail:
      type: object
      properties:
        ticketCategoryId:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        documentNumber:
          type: string
        documentType:
          type: string
      required: [ticketCategoryId, firstName, lastName, documentNumber]

    BookingResponse:
      type: object
      properties:
        bookingId:
          type: string
          format: uuid
        pnrCode:
          type: string
        status:
          type: string
        totalAmount:
          type: number
        currency:
          type: string
        activityDate:
          type: string
          format: date-time
        attractionName:
          type: string

    # --- Wrappers de Respuesta ---
    ApiResponseAtraccion:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/AtraccionDto' }
        message: { type: string, nullable: true }
        errors: { type: array, items: { type: string } }

    ApiResponseListAtraccion:
      type: object
      properties:
        success: { type: boolean }
        data: { type: array, items: { $ref: '#/components/schemas/AtraccionDto' } }
        message: { type: string, nullable: true }
        errors: { type: array, items: { type: string } }

    ApiResponseBooking:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/BookingResponse' }
        message: { type: string, nullable: true }

    ApiResponseListBooking:
      type: object
      properties:
        success: { type: boolean }
        data: { type: array, items: { $ref: '#/components/schemas/BookingResponse' } }

    ApiResponseSuccess:
      type: object
      properties:
        success: { type: boolean }
        data: { type: boolean }
        message: { type: string, nullable: true }

    ApiResponseListDisponibilidad:
      type: object
      properties:
        success: { type: boolean }
        data: { type: array, items: { $ref: '#/components/schemas/DisponibilidadDto' } }
        message: { type: string, nullable: true }
        errors: { type: array, items: { type: string } }

    ApiResponseError:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string }
        errors: { type: array, items: { type: string } }

    # --- Nuevos Esquemas Facturación y Clientes ---
    InvoiceDto:
      type: object
      properties:
        id: { type: string, format: uuid }
        invoiceNumber: { type: string }
        customerName: { type: string }
        total: { type: number }
        createdAt: { type: string, format: date-time }

    ApiResponseListInvoice:
      type: object
      properties:
        success: { type: boolean }
        data: { type: array, items: { $ref: '#/components/schemas/InvoiceDto' } }

    ClientDto:
      type: object
      properties:
        id: { type: string, format: uuid }
        firstName: { type: string }
        lastName: { type: string }
        documentNumber: { type: string }

    ApiResponseClient:
      type: object
      properties:
        success: { type: boolean }
        data: { $ref: '#/components/schemas/ClientDto', nullable: true }
